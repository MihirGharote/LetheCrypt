<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit — LetheCrypt</title>
    
    <style>
      /* Fallback to dark mode (Nord) */
      html { background-color: #2e3440; } 
      /* Explicit themes matching your MUI settings */
      html[data-theme='light'] { background-color: #eceff4; }
      html[data-theme='dark'] { background-color: #2e3440; }
      body { margin: 0; }
    </style>

    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('lethecrypt_theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          
          var theme = savedTheme === 'light' || savedTheme === 'dark' 
            ? savedTheme 
            : (prefersDark ? 'dark' : 'light');
            
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main-edit.tsx"></script>
  </body>
</html>
